server:
  port: 4301

spring:
  application:
    name: donation-platform-server

  config:
    import: optional:classpath:application-local.yaml

  datasource:
    url: jdbc:postgresql://localhost:5436/donation_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 300000
      keepalive-time: 120000
      idle-timeout: 240000
      validation-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

app:
  front-url: ${APP_FRONT_URL:https://dxline-tallent.com}
  mail-from: ${MAIL_FROM:${MAIL_USERNAME:}}

jwt:
  secret: ${JWT_SECRET:donation-platform-dev-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000
  issuer: donation-platform

portone:
  api-url: ${PORTONE_API_URL:https://api.portone.io}
  # storeId·channelKey 는 프론트에 노출되는 공개 값
  store-id: ${PORTONE_STORE_ID:store-8859c392-62e5-4fe5-92d3-11c686e9b2bc}
  channel-key: ${PORTONE_CHANNEL_KEY:channel-key-943d5d92-0688-4619-ac6e-7116f665abc0}
  # 서버 전용 비밀값 — .env 로만 주입, 기본값 없음
  api-secret: ${PORTONE_API_SECRET:}
  # 웹훅 서명 검증용 — 없으면 웹훅 요청을 전부 거절한다(fail-closed)
  webhook-secret: ${PORTONE_WEBHOOK_SECRET:}
  # 결제 대기가 잔여 금액을 선점하는 시간(분)
  pending-expire-minutes: ${PORTONE_PENDING_EXPIRE_MINUTES:15}
  # '아직 승인 전' 상태를 재확인하는 상한(시간). 넘으면 결제 안 된 것으로 보고 만료
  pending-hard-expire-hours: ${PORTONE_PENDING_HARD_EXPIRE_HOURS:24}

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    bucket: ${AWS_S3_BUCKET_NAME:}
    region: ${AWS_S3_REGION:ap-northeast-2}
    prefix: ${AWS_S3_PREFIX:donation-platform}
    presign-expires-seconds: 300
