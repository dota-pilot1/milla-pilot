name: Tauri Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.result }}
    steps:
      - name: Create or find release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              return String(data.id);
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `Donation Admin ${tag}`,
              body: `자동 빌드된 릴리스입니다.

            - macOS: .dmg 설치 파일
            - Windows: .exe 설치 파일
            - updater: latest.json 및 서명 파일

            macOS는 GitHub Actions에 등록된 Apple Developer ID 인증서로 서명과 공증을 시도합니다.`,
              draft: false,
              prerelease: false,
            });
            return String(data.id);

  build-and-release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: https://dxline-tallent.com
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseName: "Donation Admin ${{ github.ref_name }}"
          releaseBody: |
            자동 빌드된 릴리스입니다.

            - macOS: .dmg 설치 파일
            - Windows: .exe 설치 파일
            - updater: latest.json 및 서명 파일

            macOS는 GitHub Actions에 등록된 Apple Developer ID 인증서로 서명과 공증을 시도합니다.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
